<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Emplea IA – Iniciar Sesión</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/landing.css">
</head>
<body class="login-body">

  <div class="login-container">

    <div class="login-header">
      <a href="landing.html#landing" class="link-forgot" ...>← Volver</a>
       
      <div class="header-logo" style="display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 15px;">
        <img src="../recursos/EMPLEA IA LOGO.jpeg" alt="Emplea IA" class="header-logo-img" style="width: 36px; height: 36px; border-radius: 10px; object-fit: cover;" />
        <span class="header-brand mensaje-blanco" style="font-size: 18px; font-weight: 800;">EMPLEA <span class="text-orange">IA</span></span>
      </div>
      <h2 class="login-title" style="font-size: 22px;">Ingresar a Emplea <span class="text-orange">IA</span></h2>
      <p class="login-subtitle">Conectando tu talento con el futuro</p>
    </div>
    <form action="dashboard.html" class="login-form">

      <div class="form-group">
        <label class="form-label">CORREO ELECTRÓNICO</label>
        <input type="email" placeholder="ejemplo@correo.com" class="form-input" required />
      </div>
     
  <div class="form-group">
  <label class="form-label">CONTRASEÑA</label>

  <div class="input-wrapper">
    <input
      type="password"
      id="password"
      placeholder="••••••••••••"
      class="form-input"
      required
    />

    <button type="button" class="toggle-pw" onclick="mostrarPassword()">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
    </button>
  </div>
</div>



      <button type="submit" class="btn-primary btn-full style-login-btn">
        INICIAR SESIÓN →
      </button>
    </form>
    <div class="login-links">
      <a href="recuperar-contraseña.html" class="link-forgot">¿Olvidaste tu contraseña?</a>
      <p class="register-text">
        ¿No tienes cuenta? <a href="registro.html" class="link-register">Regístrate aquí</a>
      </p>
    </div>
  </div>
 <script>
function mostrarPassword() {
  const password = document.getElementById("password");

  if (password.type === "password") {
    password.type = "text";
  } else {
    password.type = "password";
  }
}
</script>
</body>
</html>
