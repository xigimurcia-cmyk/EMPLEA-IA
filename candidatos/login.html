<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Emplea IA – Iniciar Sesión</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
 
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/landing.css">
</head>
<body class="login-body">
  <div class="login-container">
 
    <div class="login-header">
      <img src="../recursos/EMPLEA IA LOGO.jpeg" alt="Emplea IA" class="login-logo" />
      <h2 class="login-title">Ingresar a Emplea <span class="text-orange">IA</span></h2>
      <p class="login-subtitle">Conectando tu talento con el futuro</p>
    </div>
    <form action="dashboard.html" class="login-form">
 
      <div class="form-group">
        <label class="form-label">CORREO ELECTRÓNICO</label>
        <input type="email" placeholder="ejemplo@correo.com" class="form-input" required />
      </div>
      <div class="form-group">
        <label class="form-label">CONTRASEÑA</label>
        <input type="password" placeholder="••••••••••••" class="form-input" required />
      </div>
      <button type="submit" class="btn-primary btn-full style-login-btn">
        INICIAR SESIÓN →
      </button>
    </form>
    <div class="login-links">
      <a href="recuperar-contraseña.html" class="link-forgot">¿Olvidaste tu contraseña?</a>
      <p class="register-text">
        ¿No tienes cuenta? <a href="registro.html" class="link-register">Regístrate aquí</a>
      </p>
    </div>
  </div>
</body>
</html>
