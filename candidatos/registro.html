<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Emplea IA – Crear cuenta</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/registro.css" />
</head>
<body>

  <div class="reg-header">
    <a href="landing.html" class="btn-back">
      <span class="back-arrow">←</span>
      <span>Volver</span>
    </a>

    <div class="header-logo">
      <img src="../img/logo.jpg" alt="Emplea IA" class="header-logo-img" />
      <span class="header-brand">EMPLEA <span class="orange">IA</span></span>
    </div>

    <h1 class="reg-title">Crea tu cuenta</h1>
    <p class="reg-subtitle">Tienes todo listo para dar el siguiente paso.</p>
  </div>

  <form class="reg-body" id="registrationForm" onsubmit="handleRegister(event)">

    <button type="button" class="btn-google" onclick="alert('Google Sign-In simulado')">
      <svg width="20" height="20" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.1 0 5.8 1.1 8 2.9l6-6C34.5 3.1 29.5 1 24 1 14.8 1 7 6.7 3.7 14.6l7 5.4C12.4 13.6 17.7 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.4 5.7c4.3-4 6.8-9.9 6.8-16.9z"/>
        <path fill="#FBBC05" d="M10.7 28.6A14.8 14.8 0 0 1 9.5 24c0-1.6.3-3.2.7-4.6l-7-5.4A23.9 23.9 0 0 0 0 24c0 3.9.9 7.5 2.5 10.8l8.2-6.2z"/>
        <path fill="#34A853" d="M24 47c5.4 0 10-1.8 13.3-4.8l-7.4-5.7c-1.8 1.2-4.1 2-6.9 2-5.3 0-9.8-3.6-11.4-8.5l-8.2 6.2C7.1 41.4 15 47 24 47z"/>
      </svg>
      CONTINUAR CON GOOGLE
    </button>

    <div class="divider">
      <span class="divider-line"></span>
      <span class="divider-text">o completa el formulario</span>
      <span class="divider-line"></span>
    </div>

    <div class="form-row">
      <div class="field-group">
        <label class="field-label">NOMBRE <span class="required">*</span></label>
        <input type="text" class="field-input" id="reg-name" placeholder="Ingresa tu nombre" required />
      </div>
      <div class="field-group">
        <label class="field-label">APELLIDO <span class="required">*</span></label>
        <input type="text" class="field-input" id="reg-lastname" placeholder="Ingresa tu apellido" required />
      </div>
    </div>

    <div class="field-group">
      <label class="field-label">CORREO ELECTRÓNICO <span class="required">*</span></label>
      <input type="email" class="field-input" placeholder="Ingresa tu correo" required />
    </div>

    <div class="field-group">
      <label class="field-label">TELÉFONO</label>
      <input type="tel" class="field-input" placeholder="Ingresa tu teléfono" />
    </div>

    <div class="field-group">
      <label class="field-label">CONTRASEÑA <span class="required">*</span></label>
      <div class="input-wrapper">
        <input type="password" class="field-input" id="password" placeholder="Mínimo 8 caracteres" required />
        <button type="button" class="toggle-pw" onclick="togglePassword('password', this)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="field-group">
      <label class="field-label">CONFIRMAR CONTRASEÑA <span class="required">*</span></label>
      <div class="input-wrapper">
        <input type="password" class="field-input" id="confirm" placeholder="Repite tu contraseña" required />
        <button type="button" class="toggle-pw" onclick="togglePassword('confirm', this)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <p class="terms-note">
      Los campos marcados con * son obligatorios. Al crear tu cuenta aceptas nuestros
      <a href="#" class="link-orange">Términos de Servicio</a>.
    </p>

    <button type="submit" class="btn-primary btn-full">
      CONTINUAR →
    </button>

    <p class="login-link">
      ¿Ya tienes cuenta? <a href="index.html" class="link-orange">Ingresar</a>
    </p>

  </form>

  <script>
    // Función para mostrar/ocultar contraseñas
    function togglePassword(id, btn) {
      const input = document.getElementById(id);
      input.type = input.type === 'password' ? 'text' : 'password';
      btn.style.opacity = input.type === 'text' ? '1' : '0.5';
    }

    // Controla el registro de datos y avanza de pantalla
    function handleRegister(event) {
      event.preventDefault(); // Evita que la página se recargue bruscamente
      
      // Captura los valores de los inputs en tiempo real
      const name = document.getElementById('reg-name').value.trim();
      const lastname = document.getElementById('reg-lastname').value.trim();
      
      // Valida que los campos no contengan solo espacios en blanco
      const fullName = `${name} ${lastname}`.trim() || "Itzel Silva";
      
      // Almacenamos el nombre completo de forma local
      localStorage.setItem("usuarioNombre", fullName);
      
      // Redirección inmediata al dashboard dentro de candidatos/
      window.location.href = "dashboard.html";
    }
  </script>
</body>
</html>
