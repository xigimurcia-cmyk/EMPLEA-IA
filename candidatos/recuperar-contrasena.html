<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Emplea IA – Recuperar Contraseña</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/landing.css">
  <link rel="stylesheet" href="../css/comun-candidatos.css">
</head>
<body class="login-body">

  <div class="login-container">

    <div class="login-header">
      <a href="landing.html" class="link-forgot" style="display: inline-block; margin-bottom: 15px; font-weight: 600;">
        ← Volver
      </a>
      <div class="header-logo" style="display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 15px;">
        <img src="../recursos/EMPLEA IA LOGO.jpeg" alt="Emplea IA" class="header-logo-img" style="width: 36px; height: 36px; border-radius: 10px; object-fit: cover;" />
        <span class="header-brand mensaje-blanco" style="font-size: 18px; font-weight: 800;">EMPLEA <span class="text-orange">IA</span></span>
      </div>
      <h2 class="login-title" style="font-size: 22px;">¿Olvidaste tu <span class="text-orange">contraseña?</span></h2>
      <p class="login-subtitle">No te preocupes, te enviaremos instrucciones para recuperarla.</p>
    </div>

    <form action="login.html" class="login-form">

      <div class="form-group">
        <label class="form-label">CORREO ELECTRÓNICO</label>
        <input type="email" placeholder="ejemplo@correo.com" class="form-input" required />
      </div>

      <button type="submit" class="btn-primary btn-full style-login-btn">
        ENVIAR INSTRUCCIONES →
      </button>

    </form>

    <div class="login-links">
      <p class="register-text">
        ¿Ya la recordaste? <a href="landing.html" class="link-register">Ingresar</a>
      </p>
    </div>

  </div>

</body>
</html>
