<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión — EMPLEA IA</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/login-empresas.css">
</head>
<body>

  <header class="header">
    <a href="portal-empresas.html" class="btn-volver">← Volver</a>
    <div class="logo">
      <img src="../recursos/EMPLEA IA LOGO.jpeg" alt="EMPLEA IA" class="logo-img">
      <span class="logo-texto">EMPLEA <span class="naranja">IA</span></span>
    </div>
  </header>

  <section class="hero">
    <div class="badge-container">
      <img src="../recursos/EMPLEA IA LOGO.jpeg" alt="EMPLEA IA" class="badge-logo">
      <div>
        <span class="badge-label">PORTAL DE EMPRESAS</span>
        <p class="badge-marca">EMPLEA <span class="naranja">IA</span></p>
      </div>
    </div>
    <h1>Iniciar Sesión</h1>
    <p>Accede a tu panel de reclutamiento IA.</p>
  </section>

  <section class="formulario-container">
    <div class="formulario">
      <form action="http://127.0.0.1:5000/api/empresas/login" method="POST">

        <div class="campo">
          <label>CORREO EMPRESARIAL <span class="requerido">*</span></label>
          <div class="input-grupo">
            <img src="../recursos/CORREOEMP.jpeg" alt="" class="input-icono-img">
            <input type="email" name="correo" placeholder="rh@empresa.mx" required>
          </div>
          <p id="error-correo" class="error-msg"></p>
        </div>

        <div class="campo">
          <label>CONTRASEÑA <span class="requerido">*</span></label>
          <div class="input-grupo">
            <img src="../recursos/CONTRASENA EMPR.jpeg" alt="" class="input-icono-img">
            <input type="password" name="contrasena" placeholder="••••••••" id="password" autocomplete="new-password" required>
            <span class="input-ojo" onclick="mostrarContrasena('password')">👁</span>
          </div>
          <p id="error-contrasena" class="error-msg"></p>
          <p class="hint-contrasena">La contraseña debe tener mínimo 8 caracteres, una mayúscula, un número y un carácter especial (!@#$%^&*)</p>
        </div>

        <a href="recuperar-contrasena-empresas.html" class="naranja olvide">¿Olvidaste tu contraseña?</a>

        <button type="submit" class="btn-principal">INICIAR SESIÓN →</button>

        <p class="login-link">¿No tienes cuenta? <a href="registro-empresas.html" class="naranja">Registrar empresa</a></p>

      </form>
    </div>
  </section>

  <script src="../js/script.js"></script>
</body>
</html>
