<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrar Empresa - EMPLEA IA</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/registro-empresas.css">
</head>
<body>

  <header class="header">
    <a href="portal-empresas.html" class="btn-volver">Volver</a>
    <div class="logo">
      <img src="../recursos/EMPLEA IA LOGO.jpeg" alt="EMPLEA IA" class="logo-img">
      <span class="logo-texto">EMPLEA <span class="naranja">IA</span></span>
    </div>
  </header>

  <section class="formulario-container">
    <div class="formulario">
      <form action="http://127.0.0.1:5000/api/empresas/registro" method="POST" autocomplete="off">

        <div class="campo campo-completo">
          <label>NOMBRE DE LA EMPRESA <span class="requerido">*</span></label>
          <div class="input-grupo">
            <input type="text" name="nombre_empresa" placeholder="Tech Solutions S.A. de C.V." required>
          </div>
        </div>

        <div class="campo campo-completo">
          <label>CORREO EMPRESARIAL <span class="requerido">*</span></label>
          <div class="input-grupo">
            <input type="email" name="correo" placeholder="rh@empresa.mx" required>
          </div>
        </div>

        <div class="campo campo-completo">
          <label>TELEFONO EMPRESARIAL <span class="requerido">*</span></label>
          <div class="input-grupo">
            <input type="tel" name="telefono" placeholder="+52 656 000 0000" required>
          </div>
        </div>

        <div class="campo">
          <label>CONTRASENA <span class="requerido">*</span></label>
          <div class="input-grupo">
            <input type="password" name="contrasena" placeholder="Minimo 8 caracteres" required>
          </div>
        </div>

        <button type="submit" class="btn-principal">REGISTRARSE</button>

      </form>
    </div>
  </section>

</body>
</html>
